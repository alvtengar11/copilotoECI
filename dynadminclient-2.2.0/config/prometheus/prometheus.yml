# my global config
global:
  scrape_interval:     15s # Set the scrape interval to every 15 seconds. Default is every 1 minute.
  evaluation_interval: 15s # Evaluate rules every 15 seconds. The default is every 1 minute.
  # scrape_timeout is set to the global default (10s).

# Alertmanager configuration
alerting:
  alertmanagers:
  - static_configs:
    - targets:
      # - alertmanager:9093

# Load rules once and periodically evaluate them according to the global 'evaluation_interval'.
rule_files:
  # - "first_rules.yml"
  # - "second_rules.yml"

# A scrape configuration containing exactly one endpoint to scrape:
# Here it's Prometheus itself.
scrape_configs:
  # The job name is added as a label `job=<job_name>` to any timeseries scraped from this config.
  - job_name: 'prometheus'
    # metrics_path defaults to '/metrics'
    # scheme defaults to 'http'.
    static_configs:
    - targets: ['localhost:9090']
  - job_name: 'grafana'
    static_configs:
      - targets:
        - grafana:3000
  - job_name: 'kafka'
    static_configs:
      - targets:
          - kafka_exporter:9308
  - job_name: 'assortment-pipeline-processor'
    scrape_interval: 10s # 1s is the lowest granularity, and set as an example. Please increase to your needs as it will most likely too frequent and wasteful.
    scrape_timeout: 10s
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
        - assortment-pipeline-processor:8040
  - job_name: 'assortment-impacted'
    scrape_interval: 10s # 1s is the lowest granularity, and set as an example. Please increase to your needs as it will most likely too frequent and wasteful.
    scrape_timeout: 10s
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - assortment-impacted:8040
  - job_name: 'admingroups-to-assortment-impacted'
    scrape_interval: 10s # 1s is the lowest granularity, and set as an example. Please increase to your needs as it will most likely too frequent and wasteful.
    scrape_timeout: 10s
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - admingroups-to-assortment-impacted:8040
  - job_name: 'assortment-re-processorr'
    scrape_interval: 10s # 1s is the lowest granularity, and set as an example. Please increase to your needs as it will most likely too frequent and wasteful.
    scrape_timeout: 10s
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - assortment-re-processor:8040
  - job_name: 'assortment-delta-processor'
    scrape_interval: 10s # 1s is the lowest granularity, and set as an example. Please increase to your needs as it will most likely too frequent and wasteful.
    scrape_timeout: 10s
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - assortment-delta-processor:8040